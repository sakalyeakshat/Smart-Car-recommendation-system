services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: unless-stopped

    command: --local-infile=1

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smart_car_recommendation_system

    ports:
      - "3307:3306"

    volumes:
      - db_data:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d

    networks:
      - app_network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: akshats24/smart-car-backend:latest
    build:
      context: ./backend

    container_name: fastapi_backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    environment:
      - PYTHONPATH=/app
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=smart_car_recommendation_system

    depends_on:
      db:
        condition: service_healthy

    networks:
      - app_network

  frontend:
    image: akshats24/smart-car-frontend:latest
    platform: linux/amd64

    build:
      context: ./frontend

    container_name: react_frontend

    ports:
      - "3000:3000"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

    depends_on:
      - backend

    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  db_data: